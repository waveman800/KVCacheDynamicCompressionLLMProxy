version: '3.8'

services:
  # ==========================================
  # KVCache+动态压缩大模型代理服务
  # ==========================================
  kvcache-proxy:
    build: .
    ports:
      - "8000:8000"
    environment:
      # OpenAI 协议三要素
      - API_KEY=${API_KEY}
      - TARGET_URL=${TARGET_URL:-https://api.openai.com/v1}
      - MODEL=${MODEL:-gpt-4o-mini}
      
      # 压缩配置
      - ENABLE_COMPRESSION=${ENABLE_COMPRESSION:-true}
      - MEMORIES_TARGET=${MEMORIES_TARGET:-1500}
      - HISTORY_TARGET=${HISTORY_TARGET:-1000}
      - HISTORY_KEEP_LAST_N=${HISTORY_KEEP_LAST_N:-4}
      
      # 动态压缩算法参数
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.55}
      - SESSION_LEN=${SESSION_LEN:-8192}
      - USE_FAST_MODE=${USE_FAST_MODE:-false}
      
      # KV Cache 基础配置
      - ENABLE_KV_CACHE=${ENABLE_KV_CACHE:-true}
      - KV_CACHE_SIZE=${KV_CACHE_SIZE:-2000}
      - KV_CACHE_TTL=${KV_CACHE_TTL:-3600}
      
      # KV Cache 高性价比优化参数
      - KV_CACHE_COMPRESSION=${KV_CACHE_COMPRESSION:-true}
      - KV_CACHE_COMPRESSION_THRESHOLD=${KV_CACHE_COMPRESSION_THRESHOLD:-1024}
      - KV_CACHE_HOT_RATIO=${KV_CACHE_HOT_RATIO:-0.2}
      - KV_CACHE_ADAPTIVE_TTL=${KV_CACHE_ADAPTIVE_TTL:-true}
      - KV_CACHE_MIN_TTL=${KV_CACHE_MIN_TTL:-300}
      - KV_CACHE_MAX_TTL=${KV_CACHE_MAX_TTL:-7200}
      
      # 服务配置
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
